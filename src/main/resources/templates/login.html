<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="../static/css/color.css" rel="stylesheet">
    <link href="/css/color.css" rel="stylesheet">
</head>
<body>
<div class="d-flex justify-content-center align-items-center vh-100">

    <div class="fluid-container">
        <form method="POST" class="py-5" th:action="@{/login}">

            <!-- EMAIL PASSWORD SUBMIT-->
            <div class=" row col-12 bg_pers shadow-lg py-5">
                <!-- LOGIN-->
                    <div class="col-12 justify-content-center align-items-center">
                        <div class="col-12 text-center">
                            <h1 class="display-3">LOGIN</h1>
                        </div>
                    </div>

                <div class=" row col-12 justify-content-center align-items-center py-4">
                    <div class="col-6 text-center">
                        <label for="email" class ="text_pers">Email</label>
                        <input type="email" name="email" class="form-control text-center" id="email">
                    </div>
                </div>

                <!-- PASSWORD -->
                <div class=" row col-12 justify-content-center align-items-center py-4">
                    <div class="col-6 text-center">
                        <label for="password" class="text_pers">Password</label>
                        <input type="password" name="password" class="form-control text-center" id="password">
                    </div>
                </div>

                <div class=" row col-12  justify-content-center align-items-center py-4">
                    <div class="col-6  text-center">
                        <button type="submit" class="btn btn-dark col-12">Login</button>
                    </div>
                </div>

            </div>
        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
