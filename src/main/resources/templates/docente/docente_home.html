<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Home Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="../../static/css/color.css" rel="stylesheet">
  <link href="/css/color.css" rel="stylesheet">
</head>
<body>
<div class="d-flex justify-content-center align-items-center vh-100">

  <div class="fluid-container">

    <!-- CREA GRUPPO E GESTIONE GRUPPI -->
    <div class=" row col-12 bg_pers shadow-lg py-5">
      <div class="row col-12 text-center justify-content-center align-items-center py-3">

        <h1 th:text=" 'Benvenuto ' + ${dto.anagrafica.nome}">E-learning</h1>

        <div class="row justify-content-center py-5">
          <div class="col-sm-4 py-2" th:each="esame : ${dto.esami}">
            <div class="card">
              <div class="card-body">
                <h5 class="card-title" th:text="${esame.nome}" >Special title treatment</h5>
                <p class="card-text" th:text="${esame.corsoDiLaurea.nome}"></p>
                <a href="#" class="btn btn-primary">Visualizza</a>
              </div>
            </div>
          </div>
        </div>

        </div>
      </div>


    </div>


  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
